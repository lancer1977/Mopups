name: ci

on:
  push:
    branches: [master]
    paths:
      - "Mopups/**"
      - "global.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "Mopups/**"
      - "global.json"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
      - name: Install MAUI workload
        run: dotnet workload install maui
      - name: Configure NuGet
        run: |
          cat > NuGet.Config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="github" value="https://nuget.pkg.github.com/lancer1977/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="lancer1977" />
                <add key="ClearTextPassword" value="${GHCR_TOKEN}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      - run: dotnet restore Mopups/Mopups.Maui/Mopups.csproj --configfile NuGet.Config
      - run: dotnet build Mopups/Mopups.Maui/Mopups.csproj --configuration Release --no-restore
      - run: dotnet pack Mopups/Mopups.Maui/Mopups.csproj --configuration Release --no-build --output ./artifacts -p:PackageVersion=${{ github.run_number }}
